name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node-version:
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

  pack-smoke:
    name: pack smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack CLI
        run: pnpm --dir packages/cli pack --pack-destination "$GITHUB_WORKSPACE/tmp/packs"

      - name: Fresh install smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/tmp/install-smoke"
          cd "$GITHUB_WORKSPACE/tmp/install-smoke"
          npm init -y
          npm install "$GITHUB_WORKSPACE"/tmp/packs/*.tgz
          npx toollatch --version
          npx toollatch --help
          npx toollatch scan --json

      - name: Sensitive file guard
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -Ei '(^|/)(\.env|.*\.(pem|key|p12|pfx)|id_rsa|token|secret)' ; then
            echo "Sensitive-looking tracked file found"
            exit 1
          fi
